<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO ENGLISH HUB - Level Starter</title>
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://clerk.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://clerk.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script async crossorigin="anonymous" 
            data-clerk-publishable-key="pk_live_Y2xlcmsubGVvZW5nbGlzaC5wcm8udm4k"
            src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
    </script>

    <style>
        :root {
            --primary: #A4DE02;
            --secondary: #76BA1B;
            --text-primary: #1E3500;
            --bg1: #F4FCD9;
            --bg2: #E5F993;
            --bg3: #FFFDE7;
        }

        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 15px; box-shadow: 0 8px 16px rgba(30,53,0,0.15);
            margin-bottom: 25px; position: sticky; top: 6px; z-index: 1000;
        }

        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 26px; color: white; display: flex; align-items: center; gap: 10px; }

        .main-content {
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 3rem 2.5rem; border-radius: 25px;
            border: 4px solid var(--primary); box-shadow: 0 15px 35px rgba(30,53,0,0.2);
            position: relative; min-height: 650px;
        }

        .loading { text-align: center; padding: 120px 20px; }
        .spinner {
            width: 56px; height: 56px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #clerk-auth-ui {
            max-width: 420px;
            margin: 40px auto;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .main-content { padding: 2rem 1rem; }
            #clerk-auth-ui { max-width: 100%; padding: 15px 10px; margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo"><i class="fas fa-seedling"></i> LEO ENGLISH HUB</div>
            <div class="nav-links">
                <a href="#" onclick="handleLogout()" id="logout-btn" style="display:none;">Đăng Xuất</a>
            </div>
        </nav>

        <div class="main-content" id="main-content">
            <!-- Loading -->
            <div id="loading-screen" class="loading">
                <div class="spinner"></div>
                <p>Đang tải...</p>
            </div>

            <!-- Clerk Auth -->
            <div id="clerk-auth-ui" style="display:none;"></div>
        </div>
    </div>

    <script>
        async function initClerk() {
            const loading = document.getElementById('loading-screen');
            const authUI = document.getElementById('clerk-auth-ui');

            try {
                if (!window.Clerk) {
                    await new Promise((resolve, reject) => {
                        let attempts = 0;
                        const interval = setInterval(() => {
                            attempts++;
                            if (window.Clerk) {
                                clearInterval(interval);
                                resolve();
                            } else if (attempts > 60) {
                                clearInterval(interval);
                                reject();
                            }
                        }, 100);
                    });
                }

                await window.Clerk.load();

                loading.style.display = 'none';
                authUI.style.display = 'block';

                window.Clerk.mountSignIn(authUI, {
                    afterSignInUrl: window.location.href,
                    afterSignUpUrl: window.location.href,
                    appearance: { 
                        baseTheme: 'light', 
                        variables: { colorPrimary: '#A4DE02' },
                        layout: { socialButtonsVariant: 'iconButton' }
                    }
                });

                // === PHẦN QUAN TRỌNG: Chuyển hướng sau khi đăng nhập ===
                window.Clerk.addListener(({ user }) => {
                    if (user) {
                        // Chuyển thẳng sang trang chủ 24 bài
                        window.location.href = "trang chu 24 bai.html";
                    }
                });

            } catch (e) {
                console.error(e);
                loading.innerHTML = `
                    <p style="color:#d32f2f; font-size:1.1rem;">
                        ⚠️ Tải chậm do kết nối.<br><br>
                        <button onclick="window.location.reload()" 
                                style="padding:14px 32px; background:#A4DE02; color:white; border:none; 
                                       border-radius:12px; font-size:16px; cursor:pointer;">
                            🔄 Tải lại trang
                        </button>
                    </p>`;
            }
        }

        function handleLogout() {
            if (window.Clerk) window.Clerk.signOut();
        }

        // Khởi chạy
        window.addEventListener('load', initClerk);
    </script>
</body>
</html>
